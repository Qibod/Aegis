[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    needs_live_claude: tests that hit real Claude (skipped unless LIVE_CLAUDE=1)
    slow: tests >10s; excluded from per-PR runs
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning
