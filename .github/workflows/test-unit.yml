name: test-unit
on:
  pull_request:
    paths:
      - 'aegis-backend/**'
      - '.github/workflows/test-unit.yml'
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aegis-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: aegis-backend/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-test.txt
      - run: pytest tests/unit/ -v --tb=short
