name: test-integration
on:
  pull_request:
    paths:
      - 'aegis-backend/**'
      - '.github/workflows/test-integration.yml'
  push:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aegis_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5
    defaults:
      run:
        working-directory: aegis-backend
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/aegis_test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/aegis_test
      REDIS_URL: redis://localhost:6379/0
      ANTHROPIC_API_KEY: 'sk-mock-not-real'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: aegis-backend/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-test.txt
      - run: pytest tests/integration/ -v --tb=short -m "not needs_live_claude"
