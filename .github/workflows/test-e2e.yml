name: test-e2e
on:
  pull_request:
    paths:
      - 'aegis-frontend/**'
      - 'aegis-backend/**'
      - '.github/workflows/test-e2e.yml'
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aegis_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/aegis_test
      REDIS_URL: redis://localhost:6379/0
      ANTHROPIC_API_KEY: 'sk-mock-not-real'
      AEGIS_ENABLE_TEST_ENDPOINTS: '1'
    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: aegis-backend/requirements*.txt
      - run: pip install -r aegis-backend/requirements.txt -r aegis-backend/requirements-test.txt
      - name: Start backend
        working-directory: aegis-backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in {1..30}; do curl -fs http://localhost:8000/health && break || sleep 2; done

      # ── Frontend ─────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aegis-frontend/package-lock.json
      - name: Install frontend deps + Playwright
        working-directory: aegis-frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Build and serve frontend + run Playwright
        working-directory: aegis-frontend
        run: |
          npm run build
          npm run preview -- --port 5173 &
          for i in {1..30}; do curl -fs http://localhost:5173 && break || sleep 2; done
          BASE_URL=http://localhost:5173 API_URL=http://localhost:8000/api/v1 npx playwright test

      # ── Artifacts on failure ──────────────────────────────────────────────────
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: aegis-frontend/playwright-report/
          retention-days: 7
